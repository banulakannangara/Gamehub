<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameHub - Cyberpunk Gaming Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
  <!-- Particle Background -->
  <div id="particles-container" class="particles-container"></div>

  <!-- Canvas for Ninja Animation -->
  <canvas id="ninja-canvas" class="ninja-canvas"></canvas>

  <!-- Landing Page Content -->
  <div class="landing-content">
    <!-- Animated Title -->
    <div class="gamehub-title">
      <h1 class="glowing-text">
        <span class="letter" style="animation-delay: 0s;">G</span>
        <span class="letter" style="animation-delay: 0.1s;">A</span>
        <span class="letter" style="animation-delay: 0.2s;">M</span>
        <span class="letter" style="animation-delay: 0.3s;">E</span>
        <span class="letter" style="animation-delay: 0.4s;">H</span>
        <span class="letter" style="animation-delay: 0.5s;">U</span>
        <span class="letter" style="animation-delay: 0.6s;">B</span>
      </h1>
    </div>

    <!-- Tagline -->
    <p class="tagline">Enter the Neon Void</p>

    <!-- Enter Button -->
    <button id="enter-btn" class="enter-button">
      <span class="button-text">ENTER GAME CENTER</span>
      <span class="button-glow"></span>
    </button>

    <!-- Loading Message -->
    <div id="loading-msg" class="loading-msg">Initiating slash sequence...</div>
  </div>

  <!-- Screen Flash Effect -->
  <div id="flash-effect" class="flash-effect"></div>

  <!-- Audio Context for Sound Effects -->
  <script>
    // Initialize Web Audio API
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  </script>

  <script src="main.js"></script>
</body>
</html>
