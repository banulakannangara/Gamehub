<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game - GameHub</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .memory-container { display: flex; flex-direction: column; align-items: center; gap: 2rem; }
    .memory-grid { display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; margin: 1rem 0; }
    .memory-card { width: 80px; height: 80px; background: linear-gradient(135deg, rgba(139, 0, 255, 0.4), rgba(0, 212, 255, 0.2)); border: 3px solid var(--primary-purple); border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; transition: all 0.3s; user-select: none; box-shadow: 0 0 15px rgba(217, 70, 239, 0.3); }
    .memory-card:hover { box-shadow: 0 0 25px var(--primary-purple); }
    .memory-card.flipped { background: linear-gradient(135deg, rgba(0, 212, 255, 0.5), rgba(139, 0, 255, 0.4)); }
    .memory-card.matched { color: var(--cyan-glow); text-shadow: 0 0 10px var(--cyan-glow); }
    .stat-box { text-align: center; padding: 1rem; background: rgba(139, 0, 255, 0.1); border: 2px solid var(--border-color); border-radius: 5px; min-width: 150px; }
    .stat-label { font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; }
    .stat-value { font-size: 2rem; color: var(--cyan-glow); font-weight: bold; text-shadow: 0 0 10px var(--cyan-glow); }
    .stats { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
    .controls { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn { padding: 0.8rem 1.5rem; background: linear-gradient(135deg, var(--primary-purple), var(--secondary-purple)); border: 2px solid var(--secondary-purple); color: white; font-family: 'Courier New', monospace; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 5px; box-shadow: 0 0 15px rgba(217, 70, 239, 0.5); letter-spacing: 0.1em; text-decoration: none; display: inline-block; transition: all 0.3s; }
    .btn:hover { background: linear-gradient(135deg, var(--secondary-purple), var(--primary-purple)); box-shadow: 0 0 25px rgba(217, 70, 239, 0.8); transform: scale(1.05); }
    .game-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .game-over.active { display: flex; }
    .result { background: linear-gradient(135deg, var(--card-bg) 0%, #2a1f4a 100%); border: 3px solid var(--cyan-glow); border-radius: 10px; padding: 2rem; text-align: center; box-shadow: 0 0 40px var(--cyan-glow); }
    .result h2 { font-size: 2rem; color: var(--cyan-glow); margin-bottom: 1rem; }
    .final-value { font-size: 2.5rem; color: var(--secondary-purple); margin: 1rem 0; text-shadow: 0 0 15px var(--secondary-purple); }
    @media (max-width: 768px) { .memory-grid { grid-template-columns: repeat(3, 70px); gap: 8px; } .memory-card { width: 70px; height: 70px; font-size: 1.5rem; } }
  </style>
</head>
<body class="game-page">
  <div id="particles-container" class="particles-container"></div>
  <a href="../gamecenter.html" class="back-button"><span class="back-icon">← BACK</span></a>
  <div class="container">
    <div class="game-header">
      <h1>🧠 MEMORY CARD GAME</h1>
      <p>Match all pairs! Flip cards and find matching emojis!</p>
    </div>
    <div class="memory-container">
      <div class="memory-grid" id="gameGrid"></div>
      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Moves</div>
          <div class="stat-value" id="moves">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Matched</div>
          <div class="stat-value" id="matched">0/8</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Best Score</div>
          <div class="stat-value" id="bestScore">0</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn" id="newGameBtn">NEW GAME</button>
        <a href="../gamecenter.html" class="btn">EXIT</a>
      </div>
    </div>
  </div>
  <div class="game-over" id="gameOver">
    <div class="result">
      <h2>🎉 GAME COMPLETE!</h2>
      <p style="color: var(--text-secondary); margin-bottom: 1rem;">You completed it in:</p>
      <div class="final-value" id="finalMoves">0</div>
      <p style="color: var(--text-secondary); margin-bottom: 1rem;">Moves</p>
      <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem;">
        <button class="btn" id="playAgainBtn">PLAY AGAIN</button>
        <a href="../gamecenter.html" class="btn">RETURN</a>
      </div>
    </div>
  </div>
  <script src="../js/memory.js"></script>
</body>
</html>
