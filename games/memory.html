<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card Game - GameHub</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-content">
      <div class="logo">🎮 GameHub</div>
      <div class="nav-buttons">
        <a href="../index.html" class="nav-btn">← Back Home</a>
      </div>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <div class="container">
    <!-- GAME HEADER -->
    <section class="game-header">
      <h1>🧠 MEMORY CARD GAME 🧠</h1>
      <p>Flip cards and find matching pairs. Match all pairs as fast as you can!</p>
    </section>

    <!-- GAME INFO -->
    <div class="game-info">
      <div class="info-box">
        <div class="info-label">Moves</div>
        <div class="info-value" id="movesDisplay">0</div>
      </div>
      <div class="info-box">
        <div class="info-label">Matched</div>
        <div class="info-value" id="matchedDisplay">0/8</div>
      </div>
      <div class="info-box">
        <div class="info-label">Best Score</div>
        <div class="info-value" id="bestScoreDisplay">∞</div>
      </div>
    </div>

    <!-- GAME CONTAINER -->
    <div class="game-container">
      <!-- MEMORY GRID -->
      <div class="memory-grid" id="memoryGrid">
        <!-- Cards will be generated by JavaScript -->
      </div>

      <!-- RESULT MESSAGE -->
      <div class="guess-feedback" id="resultMessage"></div>

      <!-- CONTROLS -->
      <div style="text-align: center; margin-top: 2rem;">
        <button class="btn" id="newGameBtn">NEW GAME</button>
        <button class="btn btn-secondary" id="resetScoreBtn">RESET SCORE</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2024 GameHub Arcade. Memory Card Game Edition. 🎮</p>
  </footer>

  <script src="../js/memory.js"></script>
</body>
</html>
